<!doctype html>
<html lang="en" class="light" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
  <link rel="icon" type="image/webp" href="/jatindavis.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jatin Davis Design</title>
  <meta name="description"
    content="Portfolio of Jatin Davis, Design Engineer specializing in physical animations, spring physics systems, Web Audio API synthesizers, and mathematical interfaces." />
  <meta name="keywords"
    content="Design Engineer, Creative Developer, Front End Developer, React, Vite, Spring Physics, Interaction Design, Web Audio" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
